{% extends "base.html" %}
{% block title %}StreamWatch – Map{% endblock %}
{% block content %}
<h1>Monitoring sites map</h1>
<p class="muted">Click a marker to open the site detail page.</p>
<div id="map" class="card"></div>
<div id="map-legend" class="muted" style="margin-top: 0.5rem; font-size: 0.875rem;"></div>
{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
{% endblock %}
{% block scripts %}
<script>
(function() {
  const map = L.map('map').setView([40.0, -74.5], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
  fetch('/api/sites')
    .then(r => r.json())
    .then(sites => {
      let count = 0;
      sites.forEach(s => {
        const lat = Number(s.latitude);
        const lng = Number(s.longitude);
        if (Number.isFinite(lat) && Number.isFinite(lng)) {
          const m = L.marker([lat, lng]).addTo(map);
          const last = s.last_sample_date ? 'Last sample: ' + s.last_sample_date : '';
          const visits = s.visit_count != null ? (s.visit_count + ' visits') : '';
          m.bindPopup('<a href="/site/' + encodeURIComponent(s.site_code) + '">' + s.site_code + (s.waterbody_name ? ' – ' + s.waterbody_name : '') + '</a>' + (last || visits ? '<br><span class="muted">' + [last, visits].filter(Boolean).join(' · ') + '</span>' : ''));
          count++;
        }
      });
      document.getElementById('map-legend').textContent = count + ' sites with coordinates shown.';
    })
    .catch(() => { document.getElementById('map-legend').innerHTML = 'Could not load sites. <span class="muted">If this is the live site, check that the database is connected (open /health).</span>'; });
})();
</script>
{% endblock %}
