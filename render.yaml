# Render Blueprint: one-click deploy for StreamWatch web app
# After deploy, add DATABASE_URL in Dashboard → streamwatch → Environment (your Neon connection string).
# See docs/DEPLOYMENT.md for full instructions.

services:
  - type: web
    name: streamwatch
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    # Shell ensures $PORT is expanded; 10000 is Render free-tier default if PORT unset
    startCommand: sh -c 'gunicorn -w 1 -b 0.0.0.0:${PORT:-10000} dashboard.app:app'
